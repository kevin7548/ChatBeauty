services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chatbeauty
      POSTGRES_USER: chatbeauty
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chatbeauty}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://chatbeauty:${DB_PASSWORD:-chatbeauty}@db:5432/chatbeauty
    depends_on:
      - db
    volumes:
      # Mount BGE-M3 model (read-only, needed for query encoding)
      - ./ml/model/retrieval/bge-m3-finetuned-20260202-120852:/app/ml/model-gcs/retrieval/bge-m3-finetuned-20260202-120852:ro
      # Mount LightGBM reranker model
      - ./ml/model/reranking:/app/ml/model-gcs/reranking:ro
    restart: unless-stopped

volumes:
  pgdata:
